name: validate

on:
  push:
  pull_request:

# Issue #16: a force-push or rapid re-push should not queue redundant runs on the
# shared org runners. Cancel any in-flight run for the same ref when a new commit
# arrives. The default branch is excluded from cancellation so a merge to main
# always completes.
concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Cross-platform job (issue #16): the wrapper validators and the offline
  # self-tests are pure-Python and have no scientific runtime dependencies, so they run
  # cheaply on every OS/Python combination. This is where Windows/macOS path and
  # frontmatter regressions get caught — the things smoke_mcp_runtime.py was
  # written to be portable for but was previously only ever exercised on Linux.
  #
  # The runtime MCP smoke is deliberately NOT in this matrix: it resolves and
  # builds the full scientific stack from the pinned spedas-mcp[analysis] git
  # source (2-5 min), which is slow and brittle to run three times per OS. It runs
  # once on Linux in the `smoke` job below. Because spedas_mcp is pinned (see the
  # CHANGELOG compatibility note), a future actions/cache step keyed on the
  # resolved dependency set can widen the smoke safely.
  wrapper:
    name: wrapper (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Validate Agent Kit module index (offline packaging)
        run: python scripts/validate_agent_kit.py
      - name: Validate Claude Code module (offline packaging)
        run: python scripts/validate_plugin.py
      - name: Validator self-tests (negative cases)
        run: python scripts/test_validate_plugin.py
      - name: Fetch/kernel guard self-tests (offline)
        run: python scripts/test_fetch_guard.py
      - name: Validate Codex module (offline packaging)
        run: python plugins/codex/scripts/validate_plugin.py
      - name: Smoke tool-group self-tests (offline)
        run: python scripts/test_smoke_groups.py
      - name: Codex smoke tool-group self-tests (offline)
        run: python plugins/codex/scripts/test_smoke_groups.py
      - name: Codex cache-path portability self-tests (offline)
        run: python plugins/codex/scripts/test_cache_paths.py
      # Issue #5: cross-platform cache-path portability. The pure self-tests
      # simulate POSIX/macOS/native-Windows env from any host, and the offline
      # --cache-diagnostics check proves how the packaged ${HOME}/.cache/... values
      # actually resolve on THIS runner's OS — cheaply, with no server start, no
      # disk write, and no network. This is the per-OS evidence the full runtime
      # smoke (Linux-only) could not provide.
      - name: Cache-path portability self-tests (offline, all OS)
        run: python scripts/test_cache_paths.py
      - name: Cache-path diagnostics on this OS (offline, report-only)
        # --report-only because native-Windows runners legitimately have HOME unset,
        # so the packaged ${HOME}/.cache/... value is *expected* to show unresolved
        # there. This step captures that per-OS evidence without failing the build;
        # the strict, build-failing assertions live in the self-tests above, which
        # simulate every OS deterministically from any runner.
        run: python scripts/smoke_mcp_runtime.py --cache-diagnostics --report-only --json

  # Runtime smoke (issue #16): launches the real spedas-mcp server and verifies
  # the tool groups. Linux-only and tightly bounded so a hung handshake or a
  # broken upstream main cannot consume the whole job timeout.
  smoke:
    name: runtime smoke (ubuntu / py3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v5
      - name: Runtime smoke MCP server (verifies tool groups)
        # Step-level timeout (issue #16): the script's own --timeout 300 bounds the
        # MCP handshake; this is a hard backstop so a wedged subprocess can never
        # hang the runner indefinitely.
        timeout-minutes: 8
        run: python scripts/smoke_mcp_runtime.py --json --timeout 300
